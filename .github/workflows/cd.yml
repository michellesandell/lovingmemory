name: cd

on:
  push:
    branches: [ master ]

# Cancel in-progress runs on the same branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cd:
    # Pin to a specific runner image for maximum reproducibility
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        node: [20] # Updated to the latest LTS version

    # Opt in to the Node 24 runtime now to test and silence warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5 # v5+ runs on Node 24

      - name: Setup Node.js (${{ matrix.node }})
        uses: actions/setup-node@v5 # v5+ runs on Node 24
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn' # Automatic caching for faster installs

      - name: Install dependencies
        run: yarn install --frozen-lockfile # Ensures reproducible builds

      - name: Fix images
        run: node index.js

      - name: Generate
        run: yarn run generate

      # Replaces the single "Deploy to GitHub Pages" step above
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4